<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="data:;base64,=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>息壤 | 生成式人文时空底座</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #FDF6E3;      /* 宣纸底色 */
            --text-ink: #2C3E50;      /* 黛螺黑 */
            --accent-red: #8B1D1D;    /* 沉稳的暗朱砂红 */
            --border-gold: #D4C4A8;   /* 旧纸边缘色 */
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-ink);
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>');
        }

        .header {
            text-align: center;
            padding: 40px 0 20px;
            border-bottom: 2px solid var(--accent-red);
            width: 80%;
            margin: 0 auto 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: var(--accent-red);
            margin: 0;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .header p {
            color: #7F8C8D;
            letter-spacing: 2px;
            font-size: 0.9em;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
            gap: 40px;
        }

        /* 左侧：推演流 */
        .deduction-stream {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 150px; /* 给底部控制台留足空间 */
        }

        /* 智能体卡片 */
        .chat-card {
            background: #FFFFFF;
            border: 1px solid var(--border-gold);
            padding: 25px 30px;
            position: relative;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.02);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
        }

        .chat-card::before {
            content: "";
            position: absolute;
            top: 15px; bottom: 15px; left: 15px;
            width: 2px;
            background-color: var(--accent-red);
            opacity: 0.6;
        }

        /* 旁白卡片专属样式 */
        .narrator-card {
            background: transparent;
            border: none;
            box-shadow: none;
            text-align: center;
            padding: 15px;
            color: #555;
            font-style: italic;
        }
        
        .narrator-card::before {
            display: none;
        }
        
        .narrator-card span {
            background: rgba(212, 196, 168, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.95em;
            border: 1px dashed var(--border-gold);
        }

        .agent-name {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 8px;
            margin-left: 10px;
        }

        .agent-action {
            font-size: 0.9em;
            color: #888;
            font-style: italic;
            margin-bottom: 12px;
            margin-left: 10px;
        }

        .agent-dialogue {
            font-size: 1.05em;
            line-height: 1.8;
            margin-left: 10px;
            text-align: justify;
        }

        .agent-contribution {
            margin-top: 15px;
            margin-left: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-gold);
            color: #9A7B4F;
            font-size: 0.9em;
        }

        /* 正在思考提示 */
        .thinking-indicator {
            margin-left: 10px;
            color: #7F8C8D;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        /* 右侧：协同产出物 */
        .artifacts-panel {
            flex: 1;
            position: sticky;
            top: 20px;
            height: fit-content;
            background: #FAFAFA;
            border: 2px double var(--accent-red);
            padding: 30px;
            box-shadow: 5px 5px 0px rgba(139, 29, 29, 0.1);
        }

        .artifacts-panel h3 {
            text-align: center;
            color: var(--accent-red);
            border-bottom: 1px solid var(--border-gold);
            padding-bottom: 15px;
            margin-top: 0;
        }

        .workspace-content {
            line-height: 2;
            color: var(--text-ink);
            white-space: pre-wrap;
            font-size: 1.1em;
        }

        /* 底部控制台与干预面板 */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(253, 246, 227, 0.95);
            border-top: 1px solid var(--border-gold);
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .intervention-box {
            display: flex;
            gap: 10px;
            width: 50%;
            max-width: 600px;
        }

        .intervention-box input {
            flex: 1;
            padding: 8px 15px;
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.7);
            font-family: 'Noto Serif SC', serif;
            color: var(--accent-red);
            outline: none;
        }

        .intervention-box input::placeholder {
            color: #aaa;
        }

        .intervention-box button {
            background-color: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 15px;
        }
        
        .intervention-box button:hover {
            background-color: rgba(139, 29, 29, 0.1);
            box-shadow: none;
        }

        button {
            background-color: var(--accent-red);
            color: #FDF6E3;
            border: none;
            padding: 12px 40px;
            font-size: 1.1em;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #6A1515;
            box-shadow: 0 4px 10px rgba(139,29,29,0.3);
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>息 壤</h1>
        <p>生成式人文时空计算底座</p>
    </div>

    <div class="container">
        <div class="deduction-stream" id="chat-stream">
            <div class="chat-card">
                <div class="agent-name">【时空背景】</div>
                <div class="agent-dialogue">元丰三年冬至夜。黄州临皋亭。窗外大雪纷飞，江风呼啸。室内炭火正旺，红泥小火炉上炖着猪肉。<br>（佛印铺开宣纸，苏轼端起酒杯，王朝云在一旁研墨。三人准备协同创作一幅《临皋雪夜图》）</div>
            </div>
        </div>

        <div class="artifacts-panel">
            <h3>临皋雪夜图 (协同资产)</h3>
            <div class="workspace-content" id="workspace">（画纸空白，笔墨已具。等待落笔...）</div>
        </div>
    </div>

    <!-- 升级的底部控制台 -->
    <div class="controls">
        <div class="intervention-box">
            <input type="text" id="interventionInput" placeholder="在此输入高维指令（如：忽然一阵冷风吹开了窗户）...">
            <button onclick="sendIntervention()">注入干预</button>
        </div>
        <button id="nextBtn" onclick="nextRound()">推进时空演化 (Advance)</button>
    </div>

    <script>
        // 【新增】下达高维干预指令
        async function sendIntervention() {
            const input = document.getElementById('interventionInput');
            const msg = input.value.trim();
            if(!msg) return;

            try {
                await fetch('/api/intervene', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                
                // 给出视觉反馈
                input.value = '';
                input.placeholder = "⚡ 神谕已下达，将在下一幕触发...";
                setTimeout(() => input.placeholder = "在此输入高维指令...", 3000);
            } catch (error) {
                alert("干预失败，后端服务未响应！");
            }
        }

        // 【重构】使用 SSE 接收流式数据
        function nextRound() {
            const btn = document.getElementById('nextBtn');
            btn.disabled = true;
            btn.innerText = "时空正在流转...";
            
            removeThinking(); // 清理残留

            // 建立与后端的流式连接
            const eventSource = new EventSource('/api/stream_next');
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'narrator') {
                    // 1. 导演抛出了旁白
                    appendNarrator(data.content);
                } 
                else if (data.type === 'thinking') {
                    // 2. 某个智能体正在进行大模型推理
                    appendThinking(data.name);
                } 
                else if (data.type === 'agent_action') {
                    // 3. 智能体行动完毕
                    removeThinking();
                    appendChatCard(data.name, data.action, data.dialogue, data.contribution, data.show_image);
                    updateWorkspace(data.workspace);
                    
                    // 这一幕结束，主动关闭连接
                    eventSource.close();
                    resetButton();
                }
            };

            eventSource.onerror = function(err) {
                console.error("流式连接错误:", err);
                eventSource.close();
                removeThinking();
                resetButton();
                appendNarrator("【系统】时空波动异常，连接中断。");
            };
            
            function resetButton() {
                btn.disabled = false;
                btn.innerText = "推进时空演化 (Advance)";
                scrollToBottom();
            }
        }

        // 渲染普通的智能体卡片
        function appendChatCard(name, action, dialogue, contribution, showImage) {
            const stream = document.getElementById('chat-stream');
            
            let contributionHtml = contribution && contribution !== "无" 
                ? `<div class="agent-contribution">[任务补充]：${contribution}</div>` : '';

            let imageHtml = '';
            if (showImage && showImage !== "无") {
                // 默认从 /images/song/ 加载
                imageHtml = `
                    <div style="margin-top: 15px; margin-left: 10px;">
                        <p style="font-size: 0.8em; color: #8B1D1D; margin-bottom: 5px;">📜 呈上时空文献：</p>
                        <img src="/images/${showImage}" alt="文献" style="max-width: 80%; border: 2px solid var(--border-gold); border-radius: 4px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);" onerror="this.src='/images/song/${showImage}'">
                    </div>
                `;
            }

            const cardHtml = `
                <div class="chat-card">
                    <div class="agent-name">【${name}】</div>
                    <div class="agent-action">动作：${action}</div>
                    <div class="agent-dialogue">${dialogue}</div>
                    ${imageHtml}
                    ${contributionHtml}
                </div>
            `;
            stream.insertAdjacentHTML('beforeend', cardHtml);
            scrollToBottom();
        }  

        // 渲染导演的旁白
        function appendNarrator(content) {
            const stream = document.getElementById('chat-stream');
            const html = `
                <div class="chat-card narrator-card">
                    <span>🎬 ${content}</span>
                </div>
            `;
            stream.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // 显示“思考中”动画
        function appendThinking(name) {
            removeThinking();
            const stream = document.getElementById('chat-stream');
            const html = `<div id="thinking-indicator" class="thinking-indicator">【${name}】的意识正在涌动...</div>`;
            stream.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // 移除思考动画
        function removeThinking() {
            const indicator = document.getElementById('thinking-indicator');
            if (indicator) indicator.remove();
        }

        function updateWorkspace(content) {
            document.getElementById('workspace').innerHTML = content.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
