<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="data:;base64,=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>息壤 | 生成式人文时空底座</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #FDF6E3;
            --text-ink: #2C3E50;
            --accent-red: #8B1D1D;
            --border-gold: #D4C4A8;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-ink);
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>');
        }

        .header {
            text-align: center;
            padding: 40px 0 20px;
            border-bottom: 2px solid var(--accent-red);
            width: 80%;
            margin: 0 auto 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: var(--accent-red);
            margin: 0;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .header p {
            color: #7F8C8D;
            letter-spacing: 2px;
            font-size: 0.9em;
        }

        /* 创世控制台样式 */
        .creation-panel {
            width: 80%;
            margin: 0 auto 30px;
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px dashed var(--border-gold);
            border-radius: 8px;
        }
        
        .creation-panel h3 {
            color: var(--accent-red);
            margin-top: 0;
        }

        .creation-panel input, .creation-panel select {
            padding: 10px 15px;
            font-size: 1.05em;
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            margin-right: 10px;
            font-family: 'Noto Serif SC', serif;
            color: var(--text-ink);
            background: rgba(255,255,255,0.8);
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
            gap: 40px;
        }

        .deduction-stream {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 180px;
        }

        .chat-card {
            background: #FFFFFF;
            border: 1px solid var(--border-gold);
            padding: 25px 30px;
            position: relative;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.02);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
            border-radius: 4px;
        }

        .chat-card::before {
            content: "";
            position: absolute;
            top: 15px; bottom: 15px; left: 15px;
            width: 2px;
            background-color: var(--accent-red);
            opacity: 0.6;
        }

        .narrator-card {
            background: transparent;
            border: none;
            box-shadow: none;
            text-align: center;
            padding: 15px;
            color: #555;
            font-style: italic;
        }
        
        .narrator-card::before {
            display: none;
        }
        
        .narrator-card span {
            background: rgba(212, 196, 168, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.95em;
            border: 1px dashed var(--border-gold);
        }

        .agent-name {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 8px;
            margin-left: 10px;
        }

        .agent-action {
            font-size: 0.9em;
            color: #888;
            font-style: italic;
            margin-bottom: 12px;
            margin-left: 10px;
        }

        .agent-dialogue {
            font-size: 1.05em;
            line-height: 1.8;
            margin-left: 10px;
            text-align: justify;
        }

        .agent-contribution {
            margin-top: 15px;
            margin-left: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-gold);
            color: #9A7B4F;
            font-size: 0.9em;
        }

        .thinking-indicator {
            margin-left: 10px;
            color: #7F8C8D;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-red);
            vertical-align: middle;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        .artifacts-panel {
            flex: 1;
            position: sticky;
            top: 20px;
            height: fit-content;
            background: #FAFAFA;
            border: 2px double var(--accent-red);
            padding: 30px;
            box-shadow: 5px 5px 0px rgba(139, 29, 29, 0.1);
        }

        .artifacts-panel h3 {
            text-align: center;
            color: var(--accent-red);
            border-bottom: 1px solid var(--border-gold);
            padding-bottom: 15px;
            margin-top: 0;
        }

        .workspace-content {
            line-height: 2;
            color: var(--text-ink);
            white-space: pre-wrap;
            font-size: 1.1em;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(253, 246, 227, 0.95);
            border-top: 1px solid var(--border-gold);
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .mode-switch {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
            width: 50%;
            max-width: 600px;
            justify-content: center;
        }

        .mode-switch button {
            background-color: transparent;
            color: #7F8C8D;
            border: 1px solid var(--border-gold);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-switch button.active {
            background-color: var(--accent-red);
            color: #FDF6E3;
            border-color: var(--accent-red);
            box-shadow: 0 2px 8px rgba(139,29,29,0.2);
        }

        .intervention-box {
            display: flex;
            gap: 10px;
            width: 50%;
            max-width: 600px;
        }

        .intervention-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Noto Serif SC', serif;
            color: var(--text-ink);
            outline: none;
        }
        
        .intervention-box input:focus {
            border-color: var(--accent-red);
        }

        .intervention-box button {
            background-color: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 15px;
            cursor: pointer;
        }
        
        .intervention-box button:hover {
            background-color: rgba(139, 29, 29, 0.1);
        }

        .advance-btn {
            background-color: var(--accent-red);
            color: #FDF6E3;
            border: none;
            padding: 10px 30px;
            font-size: 1.05em;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .advance-btn:hover {
            background-color: #6A1515;
            box-shadow: 0 4px 10px rgba(139,29,29,0.3);
        }

        .advance-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 唤醒按钮特殊颜色 */
        .btn-resume {
            background-color: #2C3E50;
        }
        .btn-resume:hover {
            background-color: #1a252f;
            box-shadow: 0 4px 10px rgba(44,62,80,0.3);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes blink { 
            50% { opacity: 0; } 
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>息 壤</h1>
        <p>生成式人文时空计算底座 · 浩瀚绿洲</p>
    </div>

    <div class="creation-panel" id="creationPanel">
        <h3>🌌 开辟新时空</h3>
        <p style="color: #777; font-size: 0.9em; margin-bottom: 20px;">输入主题与风格，大模型将为您动态生成世界观、环境与NPC网络。</p>
        
        <div style="margin-bottom: 25px;">
            <input type="text" id="worldThemeInput" placeholder="主题，如：明朝万历年间，江南茶馆..." style="width: 40%;">
            <select id="worldGenreInput">
                <option value="历史客观写实">📜 历史客观写实</option>
                <option value="宫廷权谋/政治">🗡️ 宫廷权谋/政治</option>
                <option value="市井烟火">🏮 市井烟火</option>
                <option value="凄美宿命/红楼梦">🌸 凄美宿命/红楼梦</option>
            </select>
            <button class="advance-btn" id="createWorldBtn" onclick="createNewWorld()">创世</button>
        </div>
        
        <hr style="border: none; border-top: 1px dashed var(--border-gold); margin: 25px auto; width: 60%;">
        
        <h3>🔄 唤醒旧日时空</h3>
        <p style="color: #777; font-size: 0.9em; margin-bottom: 20px;">输入之前离开时的 Session ID，无缝读取世界进度、物理环境与NPC记忆。</p>
        <div>
            <input type="text" id="resumeSessionId" placeholder="输入已存在的 Session ID (如 session_123abc)..." style="width: 50%;">
            <button class="advance-btn btn-resume" id="resumeWorldBtn" onclick="resumeWorld()">唤醒</button>
        </div>

        <div id="creationStatus" style="margin-top: 20px; color: var(--accent-red); font-weight: bold; font-style: italic;"></div>
    </div>

    <div class="container hidden" id="mainContainer">
        <div class="deduction-stream" id="chat-stream"></div>

        <div class="artifacts-panel">
            <h3 id="workspaceTitle">时空焦点产物</h3>
            <div class="workspace-content" id="workspace">等待生成...</div>
        </div>
    </div>

    <div class="controls hidden" id="controlsPanel">
        <div class="mode-switch">
            <button id="godModeBtn" class="active" onclick="switchMode('god')">⚡ 上帝环境干预</button>
            <button id="playerModeBtn" onclick="switchMode('player')">👤 玩家化身入局</button>
        </div>

        <div class="intervention-box" id="godPanel">
            <input type="text" id="interventionInput" placeholder="在此输入高维指令（如：忽然一阵冷风吹开了窗户）...">
            <button onclick="sendIntervention()">降下神谕</button>
        </div>

        <div class="intervention-box hidden" id="playerPanel">
            <input type="text" id="playerAction" placeholder="你的动作 (如: 走上前作揖)" style="flex: 0.3;">
            <input type="text" id="playerDialogue" placeholder="对他们说点什么..." style="flex: 0.7;">
            <button onclick="sendPlayerAction()">发言</button>
        </div>

        <button class="advance-btn" id="nextBtn" onclick="nextRound()" style="margin-top: 5px;">推进时空演化 (Advance)</button>
    </div>

    <script>
        let currentSessionId = ""; 

        async function createNewWorld() {
            const themeInput = document.getElementById('worldThemeInput');
            const genreInput = document.getElementById('worldGenreInput');
            const btn = document.getElementById('createWorldBtn');
            const statusDiv = document.getElementById('creationStatus');
            
            const theme = themeInput.value.trim();
            const genre = genreInput.value;

            if (!theme) {
                alert("请输入要创世的主题！");
                return;
            }

            btn.disabled = true;
            statusDiv.innerText = "🌌 正在连接高维大模型进行世界推演，请耐心等待（约 10-20 秒）...";

            try {
                // ⚡ 将风格也传给后端
                const response = await fetch('/api/create_world', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ theme: theme, genre: genre })
                });

                const data = await response.json();

                if (data.status === "success") {
                    currentSessionId = data.session_id;
                    enterWorldMode();
                    initWorldUI(data);
                } else {
                    statusDiv.innerText = "❌ 创世失败：" + data.message;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("创世请求出错:", error);
                statusDiv.innerText = "❌ 网络错误，无法连接到后端世界架构师。";
                btn.disabled = false;
            }
        }

        // ⚡ 核心逻辑：唤醒旧日时空
        function resumeWorld() {
            const sidInput = document.getElementById('resumeSessionId');
            const sid = sidInput.value.trim();
            const statusDiv = document.getElementById('creationStatus');

            if (!sid) {
                alert("请输入要唤醒的 Session ID！");
                return;
            }

            currentSessionId = sid;
            enterWorldMode();
            
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = '';
            appendNarrator(`时空坐标锁定完毕。正在从硬盘深处唤醒 [${sid}] 的世界进度与物理法则...`);
            
            // 自动触发下一回合，拉取数据
            nextRound();
        }

        function enterWorldMode() {
            document.getElementById('creationPanel').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            document.getElementById('controlsPanel').classList.remove('hidden');
        }

        function initWorldUI(data) {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = ''; 
            
            const bgCardHtml = `
                <div class="chat-card">
                    <div class="agent-name">【时空背景】 (当前坐标: <span style="user-select:all; background:#eee; padding:2px 5px; border-radius:3px;">${data.session_id}</span>)</div>
                    <div class="agent-dialogue" style="white-space: pre-wrap;">${data.scene_desc}</div>
                    <div style="margin-top: 15px; font-size: 0.9em; color: #666; font-style: italic;">
                        唤醒角色：${data.agents.join("、")}，以及异乡人（你）。请妥善保管上述坐标(Session ID)以便下次返回。
                    </div>
                </div>
            `;
            stream.insertAdjacentHTML('beforeend', bgCardHtml);
            
            if (data.initial_dialogue) {
                 const initDialogueHtml = `
                    <div class="chat-card">
                        <div class="agent-name">【起始动作】</div>
                        <div class="agent-dialogue">${data.initial_dialogue}</div>
                    </div>
                `;
                stream.insertAdjacentHTML('beforeend', initDialogueHtml);
            }
        }

        function switchMode(mode) {
            const godBtn = document.getElementById('godModeBtn');
            const playerBtn = document.getElementById('playerModeBtn');
            const godPanel = document.getElementById('godPanel');
            const playerPanel = document.getElementById('playerPanel');

            if (mode === 'god') {
                godBtn.classList.add('active');
                playerBtn.classList.remove('active');
                godPanel.classList.remove('hidden');
                playerPanel.classList.add('hidden');
            } else {
                playerBtn.classList.add('active');
                godBtn.classList.remove('active');
                playerPanel.classList.remove('hidden');
                godPanel.classList.add('hidden');
            }
        }

        async function sendIntervention() {
            if (!currentSessionId) return;
            const input = document.getElementById('interventionInput');
            const msg = input.value.trim();
            if(!msg) return;

            try {
                await fetch('/api/intervene', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: currentSessionId }) 
                });
                input.value = '';
                input.placeholder = "⚡ 神谕已下达，将在下一幕触发...";
                setTimeout(() => input.placeholder = "在此输入高维指令...", 3000);
            } catch (error) {}
        }

        async function sendPlayerAction() {
            if (!currentSessionId) return;

            const actionInput = document.getElementById('playerAction');
            const dialogueInput = document.getElementById('playerDialogue');
            const action = actionInput.value.trim() || "看着大家";
            const dialogue = dialogueInput.value.trim();

            if(!dialogue) return;

            try {
                await fetch('/api/player_act', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_id: currentSessionId, 
                        action: action,
                        dialogue: dialogue
                    }) 
                });
                
                appendChatCard("异乡人（你）", action, dialogue, "无", "无", true);
                
                actionInput.value = '';
                dialogueInput.value = '';
                nextRound();
            } catch (error) {}
        }

        function nextRound() {
            if (!currentSessionId) return;

            const btn = document.getElementById('nextBtn');
            btn.disabled = true;
            btn.innerText = "时空法则正在演算...";
            removeThinking();

            const eventSource = new EventSource('/api/stream_next/' + currentSessionId);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'narrator') {
                    appendNarrator(data.content);
                } 
                else if (data.type === 'thinking') {
                    appendThinking(data.name);
                }
                else if (data.type === 'stream_token') {
                    removeThinking();
                    appendOrUpdateStreamCard(data.name, data.content);
                } 
                else if (data.type === 'agent_action') {
                    removeStreamCard();
                    appendChatCard(data.name, data.action, data.dialogue, data.contribution, data.show_image);
                    updateWorkspace(data.workspace);
                    eventSource.close();
                    resetButton();
                }
            };

            eventSource.onerror = function() {
                eventSource.close();
                removeThinking();
                removeStreamCard();
                resetButton();
                appendNarrator("【系统】时空波动异常，演算暂时中断。");
            };
            
            function resetButton() {
                btn.disabled = false;
                btn.innerText = "推进时空演化 (Advance)";
                scrollToBottom();
            }
        }

        function appendOrUpdateStreamCard(name, token) {
            let streamCard = document.getElementById('streaming-card');
            let contentDiv;
            
            if (!streamCard) {
                const stream = document.getElementById('chat-stream');
                const cardHtml = `
                    <div class="chat-card" id="streaming-card" style="border-left-color: var(--accent-red);">
                        <div class="agent-name">【${name}】<span style="font-size: 0.7em; color: #7F8C8D; font-weight: normal; margin-left: 10px;">(神识推演中...)</span></div>
                        <div class="agent-dialogue" style="font-family: monospace; white-space: pre-wrap; font-size: 0.95em; color: #555;" id="streaming-content"></div>
                    </div>
                `;
                stream.insertAdjacentHTML('beforeend', cardHtml);
                streamCard = document.getElementById('streaming-card');
                contentDiv = document.getElementById('streaming-content');
            } else {
                contentDiv = document.getElementById('streaming-content');
            }

            const oldCursor = document.getElementById('typing-cursor');
            if (oldCursor) oldCursor.remove();

            contentDiv.appendChild(document.createTextNode(token));
            contentDiv.insertAdjacentHTML('beforeend', '<span class="typing-cursor" id="typing-cursor"></span>');
            scrollToBottom();
        }

        function removeStreamCard() {
            const card = document.getElementById('streaming-card');
            if (card) card.remove();
        }

        function appendChatCard(name, action, dialogue, contribution, showImage, isPlayer = false) {
            const stream = document.getElementById('chat-stream');
            
            let contributionHtml = contribution && contribution !== "无" 
                ? `<div class="agent-contribution">[产物变化]：${contribution}</div>` : '';

            let imageHtml = '';
            if (showImage && showImage !== "无") {
                imageHtml = `
                    <div style="margin-top: 15px; margin-left: 10px;">
                        <img src="/images/${showImage}" style="max-width: 80%; border: 2px solid var(--border-gold); border-radius: 4px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);" onerror="this.src='/images/song/${showImage}'">
                    </div>
                `;
            }

            const borderStyle = isPlayer ? 'border-color: #2C3E50; border-width: 2px;' : '';
            const nameColor = isPlayer ? 'color: #2C3E50;' : '';
            const bgStyle = isPlayer ? 'background: #F4F7F6;' : '';

            const cardHtml = `
                <div class="chat-card" style="${borderStyle} ${bgStyle}">
                    <div class="agent-name" style="${nameColor}">【${name}】</div>
                    <div class="agent-action">动作：${action}</div>
                    <div class="agent-dialogue">${dialogue}</div>
                    ${imageHtml}
                    ${contributionHtml}
                </div>
            `;
            stream.insertAdjacentHTML('beforeend', cardHtml);
            scrollToBottom();
        }  

        function appendNarrator(content) {
            const stream = document.getElementById('chat-stream');
            const html = `<div class="chat-card narrator-card"><span>🎬 ${content}</span></div>`;
            stream.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function appendThinking(name) {
            removeThinking();
            const stream = document.getElementById('chat-stream');
            const html = `<div id="thinking-indicator" class="thinking-indicator">【${name}】的意识正在涌动...</div>`;
            stream.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function removeThinking() {
            const indicator = document.getElementById('thinking-indicator');
            if (indicator) indicator.remove();
        }

        function updateWorkspace(content) {
            document.getElementById('workspace').innerHTML = content.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
